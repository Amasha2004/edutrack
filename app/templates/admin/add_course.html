{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Add Course</h2>
<div class="card shadow col-md-6">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Course Code</label>
                <input type="text" name="course_code" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Course Name</label>
                <input type="text" name="course_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Credits</label>
                <input type="number" name="credits" class="form-control" min="1" max="6" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="text" name="semester" class="form-control" placeholder="e.g. Fall 2024">
            </div>
            <div class="mb-3">
                <label class="form-label">Teacher</label>
                <select name="teacher_id" class="form-select">
                    <option value="">-- Select --</option>
                    {% for t in teachers %}
                    <option value="{{ t.id }}">{{ t.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Department</label>
                <select name="department_id" class="form-select">
                    <option value="">-- Select --</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100">Add Course</button>
        </form>
    </div>
</div>
<a href="{{ url_for('admin.courses') }}" class="btn btn-secondary mt-3">← Back</a>
{% endblock %}
