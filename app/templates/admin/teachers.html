{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Teachers</h2>
    <a href="{{ url_for('admin.add_teacher') }}" class="btn btn-success">+ Add Teacher</a>
</div>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr><th>Name</th><th>Employee No.</th><th>Department</th></tr>
    </thead>
    <tbody>
        {% for t in teachers %}
        <tr>
            <td>{{ t.full_name }}</td>
            <td>{{ t.employee_number }}</td>
            <td>{{ t.department.name if t.department else 'N/A' }}</td>
        </tr>
        {% else %}
        <tr><td colspan="3" class="text-center">No teachers yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">← Back</a>
{% endblock %}
