{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Teachers</h2>
    <a href="{{ url_for('admin.add_teacher') }}" class="btn btn-success">+ Add Teacher</a>
</div>

<input type="text" id="searchInput" class="form-control mb-3"
       placeholder="🔍 Search by name, employee number or department...">

<table class="table table-bordered" id="teachersTable">
    <thead class="table-dark">
        <tr><th>Name</th><th>Employee No.</th><th>Department</th><th>Action</th></tr>
    </thead>
    <tbody>
        {% for t in teachers %}
        <tr>
            <td>{{ t.full_name }}</td>
            <td>{{ t.employee_number }}</td>
            <td>{{ t.department.name if t.department else 'N/A' }}</td>
            <td>
                <a href="{{ url_for('admin.edit_teacher', id=t.id) }}" class="btn btn-sm btn-success">Edit</a>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="text-center">No teachers yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">← Back</a>

<script>
document.getElementById('searchInput').addEventListener('keyup', function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll('#teachersTable tbody tr');
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
    });
});
</script>
{% endblock %}
