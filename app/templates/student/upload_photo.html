{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Upload Profile Photo</h2>
<div class="card shadow col-md-5">
    <div class="card-body text-center p-4">

        <!-- Current photo -->
        {% if profile.photo and profile.photo != 'default.png' %}
        <img src="{{ url_for('static', filename='uploads/' + profile.photo) }}"
             class="rounded-circle mb-3"
             style="width:120px; height:120px; object-fit:cover; border: 4px solid #1a73e8;">
        {% else %}
        <div class="mb-3" style="width:120px; height:120px; border-radius:50%;
             background: linear-gradient(135deg, #1a73e8, #7c3aed);
             display:flex; align-items:center; justify-content:center;
             margin: 0 auto; font-size:3rem; color:white;">
            {{ profile.full_name[0].upper() }}
        </div>
        {% endif %}

        <h5>{{ profile.full_name }}</h5>
        <p class="text-muted mb-4">{{ profile.student_number }}</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="photo" class="form-control" accept="image/*" required>
                <small class="text-muted">PNG, JPG or GIF. Max size 5MB.</small>
            </div>
            <button type="submit" class="btn btn-primary w-100">Upload Photo</button>
        </form>
    </div>
</div>
<a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary mt-3">← Back</a>
{% endblock %}
