<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrapper">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="login-card">
        <div class="login-logo">🔒</div>
        <h3>Reset Password</h3>
        <p class="subtitle">Enter your new password</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group-custom">
                <span class="input-icon">🔑</span>
                <input type="password" name="password" class="form-control custom-input"
                       placeholder="New password" required>
            </div>
            <div class="input-group-custom">
                <span class="input-icon">🔑</span>
                <input type="password" name="confirm_password" class="form-control custom-input"
                       placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-login">Reset Password →</button>
        </form>
    </div>
</div>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; }
.login-wrapper {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    position:relative; overflow:hidden;
}
.blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.4;
    animation:blobMove 8s infinite alternate ease-in-out; }
.blob1 { width:500px; height:500px; background:#1a73e8; top:-100px; left:-100px; }
.blob2 { width:400px; height:400px; background:#7c3aed; bottom:-80px; right:-80px; animation-delay:3s; }
.blob3 { width:300px; height:300px; background:#06b6d4; top:50%; left:50%; animation-delay:1.5s; }
@keyframes blobMove {
    0% { transform:translate(0,0) scale(1); }
    100% { transform:translate(40px,30px) scale(1.1); }
}
.login-card {
    background:rgba(255,255,255,0.07); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15); border-radius:24px;
    padding:48px 40px; width:100%; max-width:420px;
    position:relative; z-index:10;
    animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    box-shadow:0 32px 80px rgba(0,0,0,0.4);
}
@keyframes fadeUp {
    from { opacity:0; transform:translateY(50px) scale(0.95); }
    to { opacity:1; transform:translateY(0) scale(1); }
}
.login-logo { font-size:3rem; text-align:center; margin-bottom:8px; }
.login-card h3 { color:white; font-size:2rem; font-weight:700; text-align:center; margin-bottom:4px; }
.login-card .subtitle { color:rgba(255,255,255,0.6); text-align:center; margin-bottom:32px; font-size:0.9rem; }
.input-group-custom { position:relative; margin-bottom:20px; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); z-index:2; pointer-events:none; }
.custom-input {
    background:rgba(255,255,255,0.08) !important; border:1.5px solid rgba(255,255,255,0.15) !important;
    border-radius:12px !important; color:white !important;
    padding:14px 14px 14px 44px !important; font-size:0.95rem !important;
    transition:all 0.3s ease !important; width:100%;
}
.custom-input::placeholder { color:rgba(255,255,255,0.4) !important; }
.custom-input:focus {
    background:rgba(255,255,255,0.13) !important; border-color:#1a73e8 !important;
    box-shadow:0 0 0 4px rgba(26,115,232,0.25) !important;
}
.btn-login {
    width:100%; padding:14px;
    background:linear-gradient(135deg, #1a73e8, #7c3aed);
    border:none; border-radius:12px; color:white;
    font-size:1rem; font-weight:700; cursor:pointer; margin-top:8px;
    transition:all 0.3s ease;
}
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(26,115,232,0.5); }
</style>
</body>
</html>
